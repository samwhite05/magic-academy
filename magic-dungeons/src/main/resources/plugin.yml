name: MagicDungeons
version: ${version}
main: gg.magic.academy.dungeons.MagicDungeons
api-version: '1.21'
description: Instanced dungeon system for Magic Academy RPG.
authors: [MagicAcademyDev]
depend: [MagicCore, MagicItems, MagicNpcs]
softdepend: [MythicMobs, Multiverse-Core]
commands:
  party:
    description: Manage your dungeon party.
    usage: /party [invite|accept|decline|leave|kick|disband|info]
    permission: magic.party.use
    permission-message: ""
permissions:
  magic.party.use:
    description: Allows players to use party commands.
    default: true
