name: MagicAcademy
version: ${version}
main: gg.magic.academy.MagicAcademyPlugin
api-version: '1.21'
description: Rank progression, trials, and contract system for Magic Academy RPG.
authors: [MagicAcademyDev]
depend: [MagicCore, MagicNpcs, MagicSpells, MagicHideouts, MagicItems]
softdepend: [MythicMobs, LuckPerms]
commands:
  contracts:
    description: Open the Contract Board.
    usage: /contracts
    permission: magic.contracts.use
    permission-message: ""
permissions:
  magic.contracts.use:
    description: Allows players to open the contract board.
    default: true
